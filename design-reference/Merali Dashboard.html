<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Merali Lettings · Dashboard Explorations</title>
<link rel="stylesheet" href="css/login.css"/>
<link rel="stylesheet" href="css/dash.css"/>
<style>
  html,body{ margin:0; height:100%; background:#ECE6D8; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="dash-common.jsx"></script>
<script type="text/babel" src="dash-atoms.jsx"></script>
<script type="text/babel" src="dashboards.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  function App(){
    return (
      <DesignCanvas>
        <DCSection id="dash" title="Merali Lettings — Dashboard" subtitle="Two directions · 1440 × 1024">
          <DCArtboard id="d1" label="A · Light editorial" width={1440} height={1024}>
            <window.DashLight/>
          </DCArtboard>
          <DCArtboard id="d2" label="B · Dark command center" width={1440} height={1024}>
            <window.DashDark/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
